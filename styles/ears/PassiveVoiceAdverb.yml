---
# Passive voice with one adverb between the auxiliary and the
# participle: "was never used," "is automatically generated," "was not
# merged." The regex rules in Google and write-good only match
# whitespace between the auxiliary and the participle, so they miss
# this entire shape. A separate rule because Vale sequences cannot make
# the adverb slot optional; companion to PassiveVoice, same design and
# the same no-exceptions stance.
extends: sequence
message: "EARS requires active voice: '%[1]s %[2]s %[3]s'. Name the actor and use an active verb."
level: warning
tokens:
  - pattern: \b(?:am|is|are|was|were|be|been|being)\b
    tag: VBZ|VBP|VBD|VB|VBN|VBG
  - tag: RB
  - tag: VBN
