# Lints the `message:` field of every rule file with the ears prose style,
# so the package's own diagnostics don't contain the patterns they flag.
# Uses the RuleMessage View (styles/config/views/RuleMessage.yml), which selects
# the `message` field via Dasel and lints it as Markdown.
StylesPath = styles
MinAlertLevel = suggestion

[styles/ears/*.yml]
BasedOnStyles = ears
View = RuleMessage
