StylesPath = styles
MinAlertLevel = warning
Vocab = vale-ears

Packages = Google, write-good, proselint, https://github.com/tbhb/vale-ai-tells/releases/latest/download/ai-tells.zip, https://github.com/tbhb/vale-ai-tells/releases/latest/download/ai-tells-experimental.zip, https://github.com/tbhb/vale-ai-tells/releases/latest/download/ai-tells-commits.zip

[*.md]
BasedOnStyles = Vale, Google, proselint, write-good, ears, ai-tells, ai-tells-experimental

Google.Colons = NO
Google.Headings = NO
Google.Passive = NO
Google.Semicolons = warning
Google.We = NO
Google.Will = NO
write-good.E-Prime = NO
write-good.Passive = NO
write-good.TooWordy = NO

[README.md]
BasedOnStyles = Vale, Google, proselint, write-good, ears, ai-tells, ai-tells-experimental
Google.Colons = NO
Google.Headings = NO
Google.Passive = NO
Google.Semicolons = warning
Google.We = NO
Google.Will = NO
write-good.E-Prime = NO
write-good.Passive = NO
write-good.TooWordy = NO
ai-tells-experimental.HeadingTitleCase = NO

[formats]
COMMIT_EDITMSG = md

[{COMMIT_EDITMSG,.git/COMMIT_EDITMSG}]
BasedOnStyles = ears, ai-tells, ai-tells-commits

[CHANGELOG.md]
BasedOnStyles = Vale, Google, proselint, write-good, ears, ai-tells, ai-tells-experimental
ai-tells-experimental.LongWordDensity = NO
Vale.Spelling = NO
Google.Units = NO

[{styles/**/*.md,tmp/**/*.md}]
BasedOnStyles =
Google.Semicolons = NO
